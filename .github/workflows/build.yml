name: Build Proxy Driver Jar

on: [push, workflow_dispatch] # 允许手动触发和推送触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 升级到 v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4 # 升级到 v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # 升级到 v4，解决报错的关键
        with:
          name: databricks-proxy-driver
          path: target/*.jar
